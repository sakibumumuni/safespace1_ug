{% extends "base.html" %}
{% block title %}SafeSpace UG — Staff Login{% endblock %}
{% block body %}
<div class="staff-login">
    <div style="font-size: 36px; margin-bottom: 16px;">🏥</div>
    <h2>Staff Portal</h2>
    <div class="login-sub">UG Counselling Directorate — Review flagged cases and reach out to students anonymously.</div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/staff/login">
        <div class="form-group">
            <label>Your Name (for internal records)</label>
            <input type="text" name="name" class="input" placeholder="e.g. Dr. Mensah" required>
        </div>
        <div class="form-group">
            <label>Staff Access Code</label>
            <input type="password" name="access_code" class="input" placeholder="Enter access code" required>
        </div>
        <button type="submit" class="btn btn-purple btn-full" style="margin-top: 8px;">
            Enter Staff Dashboard
        </button>
    </form>

    <div style="margin-top: 24px;">
        <a href="/" style="font-size: 12px; color: var(--text-dim);">← Back to SafeSpace</a>
    </div>
</div>
{% endblock %}
